<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <!-- base href so history routing resolves correctly when deployed under a subpath -->
        <base href="/" />
        <!-- preload main painting used on General page for fastest initial fetch -->
        <!-- must match the worker-hosted URL General.vue actually fetches, not a same-origin path -->
        <link rel="preload" as="image" href="https://aidashpy-api.adiashpy.workers.dev/images/ThePaintingNewPlanetNew.webp" />
        <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
        <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
        <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64.png" />
        <!-- ensure mobile overscroll/bounce area matches app background -->
        <style>
          html, body, #app { margin: 0; padding: 0; }
        </style>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>reading log - aidashpy</title>

        <meta property="og:type" content="website" />
        <meta property="og:site_name" content="AIDASHPY" />
        <meta property="og:title" content="a reading log." />
        <meta property="og:description" content="books · film · anime" />
        <meta property="og:url" content="https://aidashpy.com" />
        <meta name="twitter:card" content="summary" />
        <meta name="twitter:title" content="a reading log." />
        <meta name="twitter:description" content="books · film · anime" />
        <meta name="theme-color" content="#c8ba8c" />
        <link rel="manifest" href="/manifest.json" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="aidashpy" />
        <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    </head>
    <body>
        <div id="app"></div>
        <script type="module" src="/src/main.js"></script>
    </body>
</html>
