name: Update Endnotes Feed

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore existing feed for date caching
        run: |
          git fetch origin gh-pages
          git checkout origin/gh-pages -- endnotes-feed.xml || true

      - name: Generate feed
        run: node scripts/generate-endnotes-feed.mjs endnotes-feed.xml

      - name: Push to gh-pages
        run: |
          git checkout gh-pages
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add endnotes-feed.xml
          git diff --staged --quiet || git commit -m "update endnotes feed"
          git push origin gh-pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
